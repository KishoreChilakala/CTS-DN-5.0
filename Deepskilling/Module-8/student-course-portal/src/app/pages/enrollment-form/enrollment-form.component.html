<main>
  <h1>Enrollment Request</h1>

  <!-- H4: #enrollForm='ngForm' gives access to NgForm instance -->
  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

    <div class="field">
      <label>Student Name</label>
      <input name="studentName" ngModel required minlength="3" #nameCtrl="ngModel">
      <span class="error-msg" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required.</span>
      <span class="error-msg" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters.</span>
    </div>

    <div class="field">
      <label>Student Email</label>
      <input name="studentEmail" type="email" ngModel required email #emailCtrl="ngModel">
      <span class="error-msg" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">Email is required.</span>
      <span class="error-msg" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">Enter a valid email.</span>
    </div>

    <div class="field">
      <label>Course ID</label>
      <input name="courseId" type="number" ngModel required #courseCtrl="ngModel">
      <span class="error-msg" *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">Course ID is required.</span>
    </div>

    <div class="field">
      <label>Preferred Semester</label>
      <select name="preferredSemester" ngModel required>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="field">
      <label><input name="agreeToTerms" type="checkbox" ngModel required> I agree to the terms</label>
    </div>

    <button class="btn-primary" type="submit" [disabled]="enrollForm.invalid">Submit</button>
    <button class="btn-secondary" type="button" (click)="enrollForm.resetForm(); submitted=false">Reset</button>

    <div class="success-msg" *ngIf="submitted">Enrollment request submitted successfully!</div>
  </form>
</main>
